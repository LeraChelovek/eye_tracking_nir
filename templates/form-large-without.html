<div class="container">
    <main class="card">
        <h1 class="title">Анкета 5/6</h1>
        
        <div class="welcome-text">
            <p>Пожалуйста, заполните форму ниже.</p>
        </div>

        <div class="progress-wrapper">
            <div class="progress-text">
                <span id="filledFields">0</span> / <span id="totalFields">20</span> полей заполнено
            </div>
            <div class="progress-bar-container">
                <div class="progress-bar-fill" id="progressFill"></div>
            </div>
        </div>

        <div class="form-scroll-container">
            <div class="participant-form" id="largeFormWithout">
                <div class="form-row">
                    <div class="form-group">
                        <label for="lastName" class="form-label">Фамилия</label>
                        <input type="text" id="lastName" name="lastName" class="form-input" 
                               placeholder="Иванов" autocomplete="off" readonly
                               onfocus="this.removeAttribute('readonly')">
                    </div>
                    <div class="form-group">
                        <label for="firstName" class="form-label">Имя</label>
                        <input type="text" id="firstName" name="firstName" class="form-input" 
                               placeholder="Иван" autocomplete="off" readonly
                               onfocus="this.removeAttribute('readonly')">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="patronymic" class="form-label">Отчество</label>
                        <input type="text" id="patronymic" name="patronymic" class="form-input" 
                               placeholder="Иванович" autocomplete="off" readonly
                               onfocus="this.removeAttribute('readonly')">
                    </div>
                    <div class="form-group">
                        <label for="city" class="form-label">Город пребывания</label>
                        <input type="text" id="city" name="city" class="form-input" 
                               placeholder="Москва" autocomplete="off" readonly
                               onfocus="this.removeAttribute('readonly')">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="birthDate" class="form-label">Дата рождения</label>
                        <input type="text" id="birthDate" name="birthDate" class="form-input" 
                               placeholder="01.01.1990" autocomplete="off" readonly
                               onfocus="this.removeAttribute('readonly')">
                    </div>
                    <div class="form-group">
                        <label for="birthPlace" class="form-label">Место рождения</label>
                        <input type="text" id="birthPlace" name="birthPlace" class="form-input" 
                               placeholder="г. Москва" autocomplete="off" readonly
                               onfocus="this.removeAttribute('readonly')">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="institute" class="form-label">Институт</label>
                        <input type="text" id="institute" name="institute" class="form-input" 
                               placeholder="Московский государственный университет" autocomplete="off" readonly
                               onfocus="this.removeAttribute('readonly')">
                    </div>
                    <div class="form-group">
                        <label for="course" class="form-label">Номер курса</label>
                        <input type="text" id="course" name="course" class="form-input" 
                               placeholder="3" autocomplete="off" readonly
                               onfocus="this.removeAttribute('readonly')">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="specialty" class="form-label">Название специальности</label>
                        <input type="text" id="specialty" name="specialty" class="form-input" 
                               placeholder="Прикладная информатика" autocomplete="off" readonly
                               onfocus="this.removeAttribute('readonly')">
                    </div>
                    <div class="form-group">
                        <label for="discipline" class="form-label">Название дисциплины</label>
                        <input type="text" id="discipline" name="discipline" class="form-input" 
                               placeholder="Айтрекинг в UX-исследованиях" autocomplete="off" readonly
                               onfocus="this.removeAttribute('readonly')">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="email" class="form-label">Email</label>
                        <input type="email" id="email" name="email" class="form-input" 
                               placeholder="ivan@example.com" autocomplete="off" readonly
                               onfocus="this.removeAttribute('readonly')">
                    </div>
                    <div class="form-group">
                        <label for="phone" class="form-label">Номер телефона</label>
                        <input type="tel" id="phone" name="phone" class="form-input" 
                               placeholder="+7 (123) 456-78-90" autocomplete="off" readonly
                               onfocus="this.removeAttribute('readonly')">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="educationForm" class="form-label">Форма обучения</label>
                        <select id="educationForm" name="educationForm" class="form-input form-select" autocomplete="off">
                            <option value="" disabled selected>Выберите форму обучения</option>
                            <option value="full-time">Очная</option>
                            <option value="part-time">Заочная</option>
                            <option value="evening">Вечерняя</option>
                            <option value="distance">Дистанционная</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="gender" class="form-label">Пол</label>
                        <select id="gender" name="gender" class="form-input form-select" autocomplete="off">
                            <option value="" disabled selected>Выберите пол</option>
                            <option value="male">Мужской</option>
                            <option value="female">Женский</option>
                        </select>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="educationLevel" class="form-label">Уровень образования</label>
                        <select id="educationLevel" name="educationLevel" class="form-input form-select" autocomplete="off">
                            <option value="" disabled selected>Выберите уровень</option>
                            <option value="bachelor">Бакалавриат</option>
                            <option value="master">Магистратура</option>
                            <option value="postgraduate">Аспирантура</option>
                            <option value="specialist">Специалитет</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="admissionYear" class="form-label">Год поступления</label>
                        <input type="text" id="admissionYear" name="admissionYear" class="form-input" 
                               placeholder="2020" autocomplete="off" readonly
                               onfocus="this.removeAttribute('readonly')">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="graduationYear" class="form-label">Год выпуска</label>
                        <input type="text" id="graduationYear" name="graduationYear" class="form-input" 
                               placeholder="2024" autocomplete="off" readonly
                               onfocus="this.removeAttribute('readonly')">
                    </div>
                    <div class="form-group">
                        <label for="groupNumber" class="form-label">Номер группы</label>
                        <input type="text" id="groupNumber" name="groupNumber" class="form-input" 
                               placeholder="ИВТ-301" autocomplete="off" readonly
                               onfocus="this.removeAttribute('readonly')">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="citizenship" class="form-label">Гражданство</label>
                        <input type="text" id="citizenship" name="citizenship" class="form-input" 
                               placeholder="Россия" autocomplete="off" readonly
                               onfocus="this.removeAttribute('readonly')">
                    </div>
                    <div class="form-group">
                        <label for="snils" class="form-label">СНИЛС</label>
                        <input type="text" id="snils" name="snils" class="form-input" 
                               placeholder="123-456-789 01" autocomplete="off" readonly
                               onfocus="this.removeAttribute('readonly')">
                    </div>
                </div>
            </div>
        </div>

        <button id="submitFormBtn" class="btn btn-primary" disabled>Далее →</button>
    </main>
</div>
