<div class="container">
    <main class="card">
        <h1 class="title">Анкета 3/6</h1>
        
        <div class="welcome-text">
            <p>Пожалуйста, заполните форму ниже.</p>
        </div>

        <div class="progress-wrapper">
            <div class="progress-text">
                Заполнено: <span id="filledFields">0</span> / <span id="totalFields">10</span> полей
            </div>
            <div class="progress-bar-container">
                <div class="progress-bar-fill" id="progressFill"></div>
            </div>
        </div>

        <div class="form-scroll-container">
            <div class="participant-form" id="mediumFormWithout">
                <div class="form-row">
                    <div class="form-group">
                        <label for="lastName" class="form-label">Фамилия</label>
                        <input type="text" id="lastName" name="lastName" class="form-input" 
                               placeholder="Иванов" autocomplete="off" readonly
                               onfocus="this.removeAttribute('readonly')">
                    </div>
                    <div class="form-group">
                        <label for="firstName" class="form-label">Имя</label>
                        <input type="text" id="firstName" name="firstName" class="form-input" 
                               placeholder="Иван" autocomplete="off" readonly
                               onfocus="this.removeAttribute('readonly')">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="patronymic" class="form-label">Отчество</label>
                        <input type="text" id="patronymic" name="patronymic" class="form-input" 
                               placeholder="Иванович" autocomplete="off" readonly
                               onfocus="this.removeAttribute('readonly')">
                    </div>
                    <div class="form-group">
                        <label for="city" class="form-label">Город пребывания</label>
                        <input type="text" id="city" name="city" class="form-input" 
                               placeholder="Москва" autocomplete="off" readonly
                               onfocus="this.removeAttribute('readonly')">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="birthDate" class="form-label">Дата рождения</label>
                        <input type="text" id="birthDate" name="birthDate" class="form-input" 
                               placeholder="01.01.1990" autocomplete="off" readonly
                               onfocus="this.removeAttribute('readonly')">
                    </div>
                    <div class="form-group">
                        <label for="birthPlace" class="form-label">Место рождения</label>
                        <input type="text" id="birthPlace" name="birthPlace" class="form-input" 
                               placeholder="г. Москва" autocomplete="off" readonly
                               onfocus="this.removeAttribute('readonly')">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="institute" class="form-label">Институт</label>
                        <input type="text" id="institute" name="institute" class="form-input" 
                               placeholder="Московский государственный университет" autocomplete="off" readonly
                               onfocus="this.removeAttribute('readonly')">
                    </div>
                    <div class="form-group">
                        <label for="course" class="form-label">Номер курса</label>
                        <input type="text" id="course" name="course" class="form-input" 
                               placeholder="3" autocomplete="off" readonly
                               onfocus="this.removeAttribute('readonly')">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="specialty" class="form-label">Название специальности</label>
                        <input type="text" id="specialty" name="specialty" class="form-input" 
                               placeholder="Прикладная информатика" autocomplete="off" readonly
                               onfocus="this.removeAttribute('readonly')">
                    </div>
                    <div class="form-group">
                        <label for="discipline" class="form-label">Название дисциплины</label>
                        <input type="text" id="discipline" name="discipline" class="form-input" 
                               placeholder="Айтрекинг в UX-исследованиях" autocomplete="off" readonly
                               onfocus="this.removeAttribute('readonly')">
                    </div>
                </div>
            </div>
        </div>

        <button id="submitFormBtn" class="btn btn-primary" disabled>Далее →</button>
    </main>
</div>
